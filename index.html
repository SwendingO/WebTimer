<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #0f0f1a;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    .screen {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 20px;
    }

    .hidden { display: none !important; }

    button {
      cursor: pointer;
      font-family: inherit;
    }

    /* ── Flash animations ── */
    @keyframes flash-1min {
      0%, 100% { background-color: #0f0f1a; }
      50%       { background-color: #3d0000; }
    }
    @keyframes flash-end {
      0%, 100% { background-color: #3d0000; }
      50%       { background-color: #0f0f1a; }
    }
    body.flash-1min  { animation: flash-1min  0.4s  ease-in-out 7; }
    body.flash-15sec { animation: flash-1min  0.3s  ease-in-out infinite; }
    body.flash-end   { animation: flash-end   0.8s  ease-in-out infinite; }

    /* ── Setup Screen ── */
    #preset-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      width: 100%;
      max-width: 520px;
    }

    .preset {
      background: #1a1a2e;
      border: 2px solid #2a2a45;
      border-radius: 12px;
      color: #ccc;
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      font-weight: 600;
      padding: 18px 8px;
      transition: border-color 0.1s, background 0.1s, color 0.1s;
    }

    .preset:hover   { border-color: #4ade80; color: #fff; }
    .preset.selected { border-color: #4ade80; background: #1e3a2f; color: #4ade80; }

    #stepper {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    #stepper button {
      background: #1a1a2e;
      border: 2px solid #2a2a45;
      border-radius: 12px;
      color: #fff;
      font-size: 2rem;
      font-weight: bold;
      width: 64px;
      height: 64px;
      line-height: 1;
    }

    #stepper button:hover { border-color: #4ade80; }

    #stepper-display {
      font-family: monospace;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 900;
      min-width: 140px;
      text-align: center;
      letter-spacing: 2px;
    }

    #btn-start {
      background: #4ade80;
      border: none;
      border-radius: 14px;
      color: #000;
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      font-weight: 800;
      padding: 20px 0;
      width: 100%;
      max-width: 520px;
      letter-spacing: 0.05em;
    }

    #btn-start:hover { background: #86efac; }

    /* ── Timer Screen ── */
    #screen-timer {
      gap: 0;
      position: relative;
    }

    .timer-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 16px;
    }

    #ring-svg {
      width:  min(calc(100vh - 90px), calc(100vw - 32px));
      height: min(calc(100vh - 90px), calc(100vw - 32px));
    }

    #blocks-container {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: clamp(4px, 0.8vw, 10px);
      row-gap: clamp(6px, 1.2vh, 14px);
      width: 100%;
      max-width: 960px;
      padding: 0 20px;
    }

    .block {
      height: clamp(16px, 2.5vh, 32px);
      border-radius: 4px;
      background: #4ade80;
      transition: background 0.3s;
    }

    .block.empty { background: #1a1a2e !important; }

    #blocks-time {
      font-family: monospace;
      font-size: clamp(60px, 14vw, 200px);
      font-weight: 900;
      line-height: 1;
      margin-top: 28px;
      color: #4ade80;
    }

    /* ── Bottom Bar ── */
    #bottom-bar {
      display: flex;
      gap: 10px;
      padding: 10px 14px 14px;
      width: 100%;
      background: rgba(0, 0, 0, 0.35);
      flex-shrink: 0;
    }

    #bottom-bar button {
      flex: 1;
      background: #1a1a2e;
      border: 2px solid #2a2a45;
      border-radius: 10px;
      color: #ccc;
      font-size: clamp(0.85rem, 2vw, 1.1rem);
      font-weight: 600;
      padding: 14px 6px;
    }

    #bottom-bar button:hover { border-color: #4ade80; color: #fff; }

    #btn-pause {
      flex: 2;
      border-color: #4ade80;
      color: #4ade80;
    }

    /* ── Time Adjust Panel ── */
    #time-adjust {
      position: absolute;
      right: 1.5rem;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 10;
    }

    #time-adjust button {
      background: rgba(26, 26, 46, 0.85);
      border: 2px solid #2a2a45;
      border-radius: 10px;
      color: #ccc;
      font-size: 1.8rem;
      width: 56px;
      height: 56px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #time-adjust button:hover { border-color: #4ade80; color: #fff; }

    #time-adjust .adjust-label {
      color: #666;
      font-family: monospace;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <!-- ══ SETUP SCREEN ══ -->
  <div id="screen-setup" class="screen">
    <h1 style="font-size:clamp(1.4rem,3vw,2rem);font-weight:700;letter-spacing:0.05em;">Set Timer</h1>

    <div id="preset-grid">
      <button class="preset" data-seconds="300">5 min</button>
      <button class="preset" data-seconds="600">10 min</button>
      <button class="preset" data-seconds="900">15 min</button>
      <button class="preset" data-seconds="1200">20 min</button>
      <button class="preset" data-seconds="1800">30 min</button>
      <button class="preset" data-seconds="2700">45 min</button>
      <button class="preset" data-seconds="3600">1 hr</button>
      <button class="preset" data-seconds="5400">90 min</button>
      <button class="preset" data-seconds="7200">2 hr</button>
    </div>

    <div id="stepper">
      <button id="btn-minus">−</button>
      <span id="stepper-display">10:00</span>
      <button id="btn-plus">+</button>
    </div>

    <button id="btn-start">▶ Start</button>
  </div>

  <!-- ══ TIMER SCREEN ══ -->
  <div id="screen-timer" class="screen hidden" style="padding:0;justify-content:flex-start;">

    <!-- Ring view (default) -->
    <div id="view-ring" class="timer-view">
      <svg id="ring-svg" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
        <circle id="ring-track"    cx="150" cy="150" r="130"
          fill="none" stroke="#1a1a2e" stroke-width="20"/>
        <circle id="ring-progress" cx="150" cy="150" r="130"
          fill="none" stroke="#4ade80" stroke-width="20"
          stroke-dasharray="816.81" stroke-dashoffset="0"
          stroke-linecap="round" transform="rotate(-90 150 150)"/>
        <text id="ring-time"
          x="150" y="165" text-anchor="middle"
          fill="#fff" font-family="monospace" font-size="54" font-weight="900">
          10:00
        </text>
      </svg>
    </div>

    <!-- Block view (hidden by default) -->
    <div id="view-blocks" class="timer-view hidden">
      <div id="blocks-container">
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
      </div>
      <div id="blocks-time">10:00</div>
    </div>

    <!-- Time adjust controls -->
    <div id="time-adjust">
      <button id="btn-add-time">▲</button>
      <span class="adjust-label">±0:30</span>
      <button id="btn-sub-time">▼</button>
    </div>

    <!-- Bottom bar -->
    <div id="bottom-bar">
      <button id="btn-pause">⏸ Pause</button>
      <button id="btn-restart">↺ Restart</button>
      <button id="btn-toggle-view">⊞ Blocks</button>
      <button id="btn-back">✕ Back</button>
    </div>

  </div>

  <script>
    // ── Constants ──
    const CIRCUMFERENCE = 2 * Math.PI * 130; // ring r=130

    // ── State ──
    const state = {
      totalSeconds:       600,
      remainingSeconds:   600,
      running:            false,
      view:               'ring',   // 'ring' | 'block'
      tickInterval:       null,
      milestoneTriggered:   false,  // 1-min flash already fired?
      milestone15Triggered: false,  // 15-sec flash already fired?
      oscillator:         null,
      audioCtx:           null,
      heartbeatCtx:       null,
      colorBurstTicks:    0,
      lastColor:          '',
    };

    // ── DOM refs ──
    const $ = id => document.getElementById(id);
    const screenSetup    = $('screen-setup');
    const screenTimer    = $('screen-timer');
    const presetBtns     = document.querySelectorAll('.preset');
    const stepperDisplay = $('stepper-display');
    const btnMinus       = $('btn-minus');
    const btnPlus        = $('btn-plus');
    const btnStart       = $('btn-start');
    const btnPause       = $('btn-pause');
    const btnRestart     = $('btn-restart');
    const btnToggleView  = $('btn-toggle-view');
    const btnBack        = $('btn-back');
    const viewRing       = $('view-ring');
    const viewBlocks     = $('view-blocks');
    const ringProgress   = $('ring-progress');
    const ringTime       = $('ring-time');
    const blocksContainer = $('blocks-container');
    const blocksTime     = $('blocks-time');
    const blockDivs      = blocksContainer.querySelectorAll('.block');

    // ── Utilities ──
    function formatTime(seconds) {
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      const mm = String(m).padStart(2, '0');
      const ss = String(s).padStart(2, '0');
      return h > 0 ? `${h}:${mm}:${ss}` : `${m}:${ss}`;
    }

    function getColor(remaining, total) {
      const pct = remaining / total;
      if (pct > 0.75) return '#4ade80'; // green
      if (pct > 0.50) return '#facc15'; // yellow
      if (pct > 0.25) return '#f97316'; // orange
      return '#ef4444';                  // red
    }

    // ── Init ──
    ringProgress.setAttribute('stroke-dasharray', CIRCUMFERENCE);

    // ── Setup Screen ──
    function initSetup() {
      const saved = parseInt(localStorage.getItem('timerDuration')) || 600;
      state.totalSeconds = saved;
      state.remainingSeconds = saved;
      stepperDisplay.textContent = formatTime(saved);
      presetBtns.forEach(btn => {
        btn.classList.toggle('selected', parseInt(btn.dataset.seconds) === saved);
      });
    }

    function setDuration(seconds) {
      state.totalSeconds = seconds;
      stepperDisplay.textContent = formatTime(seconds);
    }

    presetBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const s = parseInt(btn.dataset.seconds);
        setDuration(s);
        presetBtns.forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      });
    });

    btnMinus.addEventListener('click', () => {
      const newVal = Math.max(30, state.totalSeconds - 30);
      setDuration(newVal);
      presetBtns.forEach(b => b.classList.remove('selected'));
    });

    btnPlus.addEventListener('click', () => {
      const newVal = Math.min(10800, state.totalSeconds + 30);
      setDuration(newVal);
      presetBtns.forEach(b => b.classList.remove('selected'));
    });

    btnStart.addEventListener('click', () => {
      localStorage.setItem('timerDuration', state.totalSeconds);
      state.remainingSeconds = state.totalSeconds;
      state.running = true;
      state.milestoneTriggered = false;
      state.milestone15Triggered = false;
      state.colorBurstTicks = 0;
      state.lastColor = getColor(state.totalSeconds, state.totalSeconds);
      screenSetup.classList.add('hidden');
      screenTimer.classList.remove('hidden');
      updateTimerDisplay();
      startTick();            // defined in Task 7
    });

    // ── Stub placeholders (replaced in later tasks) ──
    function updateTimerDisplay() {
      const color = getColor(state.remainingSeconds, state.totalSeconds);
      const timeStr = formatTime(state.remainingSeconds);

      // Ring view
      const pct = state.remainingSeconds / state.totalSeconds;
      const offset = CIRCUMFERENCE * (1 - pct);
      ringProgress.setAttribute('stroke-dashoffset', offset);
      ringProgress.setAttribute('stroke', color);
      ringTime.textContent = timeStr;
      ringTime.setAttribute('fill', color);

      // Block view
      const filledCount = state.remainingSeconds > 0
        ? Math.ceil((state.remainingSeconds / state.totalSeconds) * 30)
        : 0;
      blockDivs.forEach((block, i) => {
        if (i < filledCount) {
          block.classList.remove('empty');
          block.style.background = color;
        } else {
          block.classList.add('empty');
          block.style.background = '';
        }
      });
      blocksTime.textContent = timeStr;
      blocksTime.style.color = color;
    }
    function startTick() {
      clearInterval(state.tickInterval);
      state.tickInterval = setInterval(() => {
        if (!state.running) return;
        state.remainingSeconds--;
        if (state.remainingSeconds <= 0) {
          state.remainingSeconds = 0;
          clearInterval(state.tickInterval);
          handleTimerEnd();
        } else {
          const newColor = getColor(state.remainingSeconds, state.totalSeconds);
          if (newColor !== state.lastColor) {
            state.colorBurstTicks = 3;
            state.lastColor = newColor;
          }
          checkMilestones();
          playHeartbeat();
          if (state.colorBurstTicks > 0) state.colorBurstTicks--;
          updateTimerDisplay();
        }
      }, 1000);
    }

    function checkMilestones() {
      if (
        state.totalSeconds >= 120 &&
        state.remainingSeconds <= 60 &&
        !state.milestoneTriggered
      ) {
        state.milestoneTriggered = true;
        trigger1MinFlash();
      }
      if (
        state.totalSeconds >= 30 &&
        state.remainingSeconds <= 15 &&
        !state.milestone15Triggered
      ) {
        state.milestone15Triggered = true;
        trigger15SecFlash();
      }
    }

    function handleTimerEnd() {
      state.running = false;
      document.body.classList.remove('flash-1min', 'flash-15sec');
      void document.body.offsetWidth;
      document.body.classList.add('flash-end');
      playSiren();          // defined in Task 10
      updateTimerDisplay();
      btnPause.textContent = '⏹ Done';
    }

    btnPause.addEventListener('click', () => {
      if (state.remainingSeconds <= 0) return;
      state.running = !state.running;
      btnPause.textContent = state.running ? '⏸ Pause' : '▶ Resume';
      if (state.running) startTick();
    });

    btnRestart.addEventListener('click', () => {
      clearInterval(state.tickInterval);
      stopSiren();
      document.body.classList.remove('flash-1min', 'flash-15sec', 'flash-end');
      state.remainingSeconds = state.totalSeconds;
      state.running = true;
      state.milestoneTriggered = false;
      state.milestone15Triggered = false;
      state.colorBurstTicks = 0;
      state.lastColor = getColor(state.totalSeconds, state.totalSeconds);
      btnPause.textContent = '⏸ Pause';
      updateTimerDisplay();
      startTick();
    });

    btnBack.addEventListener('click', () => {
      clearInterval(state.tickInterval);
      stopSiren();
      document.body.classList.remove('flash-1min', 'flash-15sec', 'flash-end');
      state.running = false;
      screenTimer.classList.add('hidden');
      screenSetup.classList.remove('hidden');
      initSetup();
    });

    btnToggleView.addEventListener('click', () => {
      if (state.view === 'ring') {
        state.view = 'block';
        viewRing.classList.add('hidden');
        viewBlocks.classList.remove('hidden');
        btnToggleView.textContent = '○ Ring';
      } else {
        state.view = 'ring';
        viewBlocks.classList.add('hidden');
        viewRing.classList.remove('hidden');
        btnToggleView.textContent = '⊞ Blocks';
      }
    });

    // stubs for tasks 9 and 10
    function playHeartbeat() {
      if (state.remainingSeconds > 60 && state.colorBurstTicks === 0) return;
      try {
        if (!state.heartbeatCtx) {
          state.heartbeatCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        const ctx  = state.heartbeatCtx;
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = 80;
        const now = ctx.currentTime;
        const urgent = state.remainingSeconds <= 15 || state.colorBurstTicks > 0;
        const vol = urgent ? 1.0 : 0.35;
        const dur = urgent ? 0.22 : 0.12;
        gain.gain.setValueAtTime(vol, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
        osc.start(now);
        osc.stop(now + dur);
      } catch (_) {}
    }

    function trigger15SecFlash() {
      document.body.classList.remove('flash-1min', 'flash-end');
      void document.body.offsetWidth;
      document.body.classList.add('flash-15sec');
    }

    function trigger1MinFlash() {
      document.body.classList.remove('flash-1min', 'flash-end');
      void document.body.offsetWidth; // force reflow so animation restarts fresh
      document.body.classList.add('flash-1min');
      // Remove the class after the animation completes (7 iterations × 0.4s = 2.8s)
      setTimeout(() => document.body.classList.remove('flash-1min'), 2800);
    }
    function playSiren() {
      stopSiren();
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        state.audioCtx = ctx;

        function scheduleBeep(freq, t, dur) {
          const osc  = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'square';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0, t);
          gain.gain.linearRampToValueAtTime(0.22, t + 0.005);
          gain.gain.setValueAtTime(0.22, t + dur - 0.02);
          gain.gain.linearRampToValueAtTime(0, t + dur);
          osc.start(t);
          osc.stop(t + dur);
        }

        const now = ctx.currentTime + 0.05;
        for (let g = 0; g < 4; g++) {
          const t = now + g * 0.75;
          scheduleBeep(880, t,        0.12);
          scheduleBeep(880, t + 0.18, 0.12);
        }
      } catch (e) {
        console.warn('Web Audio not available:', e);
      }
    }

    function stopSiren() {
      if (state.oscillator) {
        try { state.oscillator.stop(); } catch (_) {}
        state.oscillator = null;
      }
      if (state.audioCtx) {
        try { state.audioCtx.close(); } catch (_) {}
        state.audioCtx = null;
      }
    }

    // ── Boot ──
    initSetup();
  </script>
</body>
</html>
